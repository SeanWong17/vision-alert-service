name: Bug Report
description: 报告可复现的问题或行为回归
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 简要说明现象和影响
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 给出最小可复现步骤
      placeholder: |
        1. 使用什么配置启动服务
        2. 调用哪个接口
        3. 实际结果是什么
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: 环境信息
      description: Python、OS、CPU/GPU、Docker、依赖版本等
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 相关日志或截图
      render: shell
