# Docker Compose 配置（Compose 规范下无需保留 version 字段）

services:
  # 告警服务
  ai_alerting:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ai_alerting_service
    restart: unless-stopped
    ports:
      - "8011:8011"
    environment:
      - ALERT_WORKER_THREADS=4
      - ALERT_DET_DEVICE=cpu
      - ALERT_SEG_DEVICE=cpu
      - ALERT_IMAGE_RETENTION_DAYS=30
      - ALERT_CLEANUP_SCAN_INTERVAL_SECONDS=3600
      - ALERT_LICENSE_ENABLED=false
      - ALERT_LICENSE_PATH=/root/.ai_alerting/license/license.json
      - ALERT_LICENSE_PUBLIC_KEY_PATH=/root/.ai_alerting/license/public_key.pem
      - ALERT_LICENSE_ALLOW_HOSTNAME_FALLBACK=false
      - ALERT_LICENSE_CHECK_INTERVAL_SECONDS=300
      - ALERT_CONFIG_STRICT=true
    volumes:
      # 运行目录挂载：日志、上传图、结果图、模型
      - ../runtime:/root/.ai_alerting
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8011/healthz')"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 2G

  # Redis 队列与结果存储
  redis:
    image: redis:7-alpine
    container_name: ai_alerting_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  redis_data:
